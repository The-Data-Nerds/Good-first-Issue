name: Update Contributor Badge Tiers

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  update-tiers:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build contributor tier table
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              per_page: 100,
            });

            const counts = {};
            for (const pr of pulls.filter(p => p.merged_at)) {
              const login = pr.user.login;
              counts[login] = (counts[login] || 0) + 1;
            }

            const champions = [], regulars = [], timers = [];
            for (const [login, count] of Object.entries(counts)) {
              const row = `| [${login}](https://github.com/${login}) | ${count} |`;
              if (count >= 5)      champions.push(row);
              else if (count >= 2) regulars.push(row);
              else                 timers.push(row);
            }

            const empty = (msg) => `| _${msg}_ | -- |`;
            const section = (rows, msg) => rows.length ? rows.join('\n') : empty(msg);

            const lines = [
              '# \uD83C\uDFC6 Contributors Hall of Fame',
              '',
              '> Auto-updated on every merged PR. Tiers based on total merged contributions.',
              '',
              '---',
              '',
              '## \uD83E\uDD47 Champions -- 5+ PRs',
              '',
              '| Contributor | PRs Merged |',
              '|-------------|------------|',
              section(champions, 'Be the first Champion!'),
              '',
              '---',
              '',
              '## \uD83E\uDD48 Regulars -- 2-4 PRs',
              '',
              '| Contributor | PRs Merged |',
              '|-------------|------------|',
              section(regulars, 'Keep contributing to unlock this tier!'),
              '',
              '---',
              '',
              '## \uD83E\uDD49 First Timers -- 1 PR',
              '',
              '| Contributor | PRs Merged |',
              '|-------------|------------|',
              section(timers, 'No first-timers yet -- be the first!'),
              '',
              '---',
              '',
              '> \uD83D\uDCA1 **How to move up:** Every merged PR counts. Keep contributing to climb the tiers!',
              '>',
              '> This file is automatically maintained by the [Badge Tier workflow](.github/workflows/badge-tier.yml).',
            ];

            fs.writeFileSync('CONTRIBUTORS.md', lines.join('\n') + '\n', 'utf8');
            console.log('CONTRIBUTORS.md updated successfully');

      - name: Commit updated CONTRIBUTORS.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CONTRIBUTORS.md
          git diff --cached --quiet || git commit -m "chore: update contributor badge tiers [skip ci]"
          git push
